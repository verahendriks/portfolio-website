    <main class="gallery-container subpage-container">
        <div class="contact-page-layout">
            <h1>Laten we samenwerken!</h1>
            <p class="contact-intro">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse vehicula pretium dapibus. Nunc suscipit non purus luctus vulputate.</p>
            
            <form class="contact-form" action="#" method="POST">
                <div class="form-group">
                    <input type="text" name="name" placeholder="Uw naam" required>
                </div>
                <div class="form-group">
                    <input type="email" name="email" placeholder="Uw e-mailadres" required>
                </div>
                <div class="form-group">
                    <textarea name="message" rows="3" placeholder="Uw bericht..." required></textarea>
                </div>
                <button type="submit" class="submit-btn">Bericht verzenden</button>
            </form>
        </div>
    </main>
